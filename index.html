<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background: radial-gradient(circle,#ff4d6d,#1a001f);
overflow:hidden;
font-family: Arial;
}

/* glass card */
.card{
background: rgba(255,255,255,0.1);
backdrop-filter: blur(10px);
padding:25px;
border-radius:20px;
text-align:center;
color:white;
box-shadow:0 0 20px rgba(255,0,80,0.5);
}

/* input */
input{
padding:10px;
border:none;
border-radius:10px;
outline:none;
width:200px;
margin-top:10px;
text-align:center;
}

button{
padding:10px 15px;
margin-top:10px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
background:white;
}

/* hidden */
#content{display:none; text-align:center; color:white;}

/* heart */
.heart{
position:absolute;
color:pink;
animation:float 6s linear infinite;
font-size:20px;
}

@keyframes float{
0%{transform:translateY(100vh) scale(0.5);}
100%{transform:translateY(-10vh) scale(1.5);}
}

/* image */
img{
width:240px;
border-radius:20px;
margin-top:15px;
box-shadow:0 0 20px rgba(255,0,100,0.5);
}

/* glow text */
h1{
text-shadow:0 0 10px #ff4d6d,0 0 20px #ff4d6d;
}

/* typewriter */
.typing{
overflow:hidden;
border-right:.15em solid white;
white-space:nowrap;
margin:0 auto;
animation:typing 3s steps(20,end),blink .7s infinite;
}

@keyframes typing{
from{width:0}
to{width:100%}
}

@keyframes blink{
50%{border-color:transparent}
}
</style>
</head>

<body>

<div id="login" class="card">
<h2>Enter Password ❤️</h2>
<input id="pass" type="password" placeholder="••••••">
<br>
<button onclick="check()">Enter</button>
</div>

<div id="content">
<h1 class="typing">بحبك ❤️</h1>

<img src="https://i.ibb.co/VYsyL3RC/your-image.jpg">

<br><br>
<button onclick="start()">اضغط هنا ❤️</button>

<audio id="music" loop>
<source src="" type="audio/mp3">
</audio>

</div>

<script>

function check(){
if(document.getElementById("pass").value==="141199"){
document.getElementById("login").style.display="none";
document.getElementById("content").style.display="block";
spawnHearts();
}
else alert("Wrong password");
}

function spawnHearts(){
setInterval(()=>{
let h=document.createElement("div");
h.className="heart";
h.innerHTML="❤️";
h.style.left=Math.random()*100+"vw";
h.style.fontSize=(10+Math.random()*20)+"px";
document.body.appendChild(h);
setTimeout(()=>h.remove(),6000);
},200);
}

function start(){
document.getElementById("music").play();
}
</script>

</body>
</html>
